<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../assets/styles/login.css" />
  <link rel="stylesheet" href="../utils/header.css" />
</head>
<body>
  <div id="header-container"></div>

  <div class="main-content">
    <main class="main-container">
      <div class="container">
        <div class="datos">
          <form id="FormLogin">
            <h2 class="indicacion">Ingresar a mi cuenta</h2>
            <p class="subindicacion">Ingrese su email y contraseña</p>

            <label for="email">Email</label>
            <div class="input-icon">
              <i class="bi bi-envelope-fill"></i>
              <input type="email" id="email" placeholder="Escriba su correo" required />
            </div>

            <label for="password">Contraseña</label>
            <div class="input-icon">
              <i class="bi bi-lock-fill"></i>
              <input type="password" id="contraseña" placeholder="Escriba su contraseña" required />
            </div>

            <div class="acciones">
              <label class="recordar">
                <input type="checkbox" /> Recordar contraseña
              </label>
              <a href="#">¿Olvidaste tu contraseña?</a>
            </div>

            <div class="acciones extra">
              <a href="/frontend/Usuarios/register/register.html">
                ¿Aún no te registras? <strong>Crea una cuenta</strong>
              </a>
            </div>

            <button class="btnLogin">Ingresar</button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/frontend/scripts/login.js"></script>
  <script src="../utils/header.js"></script>
</body>
</html>
