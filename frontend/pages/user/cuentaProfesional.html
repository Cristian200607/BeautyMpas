<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="/frontend/utils/header.css" />
  <link rel="stylesheet" href="/frontend/assets/styles/cssUser/cuentaProfesional.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <title>Perfil Profesional</title>
</head>
<body>
  <div id="header-container"></div>

  <div class="container">
    <!-- Sección de perfil -->
    <div class="perfil">
      <div class="foto">
        <img id="imagenPerfil" src="" alt="Foto de perfil" />
      </div>

      <div class="datos">
        <h2 class="titulo-perfil">
          <i class="bi bi-person-badge-fill"></i> Perfil Profesional
        </h2>

        <!-- Datos visibles -->
        <div class="informacion">
          <h2>Nombre:</h2>
          <div id="nombreDisplay" class="display-text"></div>
        </div>

        <div class="informacion">
          <h2>Email:</h2>
          <div id="emailDisplay" class="display-text"></div>
        </div>

        <div class="informacion">
          <h2>Ciudad:</h2>
          <div id="direccionDisplay" class="display-text"></div>
        </div>

        <div class="informacion">
          <h2>Teléfono:</h2>
          <div id="telefonoDisplay" class="display-text"></div>
        </div>

        <!-- Servicios -->
        <div class="informacion categorias">
          <div id="categorias-listado" class="informacion-listado"></div>
          <div id="serviciosContainer" class="informacion-listado"></div>
        </div>

        <!-- Botón de agendar -->
        <div class="acciones">
          <a href="/cuestionario_agendar_citas/cuestionario_cliente.html">
            <button class="btn-principal"><i class="bi bi-calendar-plus"></i> Agendar Cita</button>
          </a>
        </div>
      </div>
    </div>

    <!-- Portafolio -->
    <div class="portafolio">
      <h1>Portafolio</h1>
      <div class="collage" id="collagePortafolio">
        <!-- Imágenes desde JS -->
      </div>
    </div>
  </div>
  <!-- Modal para imagen ampliada -->
<div id="modalImagen" class="modal">
  <span class="cerrar">&times;</span>
  <img class="modal-contenido" id="imgGrande">
  <a class="anterior">&#10094;</a>
  <a class="siguiente">&#10095;</a>
</div>


  <!-- Scripts -->
  <script src="/frontend/utils/header.js"></script>
  <script type="module" src="/frontend/scripts/user/getProfesionalById.js"></script>
</body>
</html>
