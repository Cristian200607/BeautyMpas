<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Extensiones de Pestañas</title>
  <link rel="stylesheet" href="/frontend/assets/styles/cssUser/cuestionarioServicios.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/frontend/utils/header.css" />
</head>
<body>
  <div id="header-container"></div>

  <!-- Servicios dinámicos generados por JS se insertarán aquí -->
  <!-- No necesitas agregar nada más aquí -->

  <!-- Fecha, hora y resumen fijo abajo -->
  <div class="barra-reserva">
    <div class="fecha-hora">
      <label for="fecha" class="fecha-label">Fecha:</label>
      <input type="date" id="fecha" class="fecha-input" />

      <label for="hora" class="fecha-label">Hora:</label>
      <input type="time" id="hora" class="fecha-input" />
    </div>

    <div class="info-reserva">
      <p id="cantidad">No has seleccionado servicios</p>
      <p>Subtotal: <span id="subtotal">$0</span></p>
      <button class="finalizar-btn" disabled>Realizar reserva</button>
    </div>
  </div>

  <script type="module" src="/frontend/scripts/user/getServiciosOfProfesional.js"></script>
  <script type="module" src="/frontend/utils/header.js"></script>
</body>
</html>
