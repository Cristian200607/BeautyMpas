<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seleccionar Categorías</title>
  <link rel="stylesheet" href="/frontend/assets/styles/cssProfesional/selectCategoria.css">
</head>
<body>
  <div class="container">
    <h1 class="titulo">Por favor seleccione las categorías que sabe</h1>

    <div class="formulario">
      <select id="select-categorias">
        <option value="">Seleccione una categoría</option>
      </select>

      <input type="text" id="nombreServicio" placeholder="Nombre del servicio (ej: Corte dama)">
      <input type="number" id="precioServicio" placeholder="Precio del servicio ($)">
      
      <button id="btnAgregar" class="btn-agregar">Agregar</button>
    </div>

    <table id="tablaCategorias">
      <thead>
        <tr>
          <th>#</th>
          <th>Categoría</th>
          <th>Servicio</th>
          <th>Precio</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <button class="btn-finalizar" id="btnFinalizar">Finalizar</button>
  </div>

  <!-- 🆕 Script para actualizar servicio -->
  <script>
    // Este script permite capturar cambios en inputs dentro de la tabla
    document.addEventListener('input', function (e) {
      if (e.target.classList.contains('input-servicio')) {
        const id = e.target.dataset.id;
        const campo = e.target.dataset.campo;
        const valor = e.target.value;

        const index = categoriasSeleccionadas.findIndex(c => c.id == id);
        if (index !== -1) {
          categoriasSeleccionadas[index][campo] = campo === 'precio' ? parseFloat(valor) : valor;
        }
      }
    });
  </script>

  <script type="module" src="/frontend/scripts/profesional/getCategorias.js"></script>
</body>
</html>
