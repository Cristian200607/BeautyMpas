<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seleccionar Categorías</title>
  <link rel="stylesheet" href="/frontend/assets/styles/cssProfesional/selectCategoria.css">
  <link rel="stylesheet" href="/frontend/utils/header.css" />
</head>
<body>
  <div id="header-container"></div>
  <div class="container">
    
    <h1 class="titulo">Por favor seleccione las categorías que sabe</h1>

    <div class="formulario">
      <select id="select-categorias">
        <option value="">Seleccione una categoría</option>
      </select>

      <input type="text" id="nombreServicio" placeholder="Nombre del servicio (ej: Corte dama)">
      <input type="number" id="precioServicio" placeholder="Precio del servicio ($)">
      <input type="text" id="descripcionServicio" placeholder="Descripción del servicio">
      <input type="text" id="tiempoServicio" placeholder="Tiempo del servicio (ej: 45min)">

      <div class="btn-agregar-container">
        <button id="btnAgregar" class="btn-agregar">Agregar</button>
      </div>
    </div>

    <table id="tablaCategorias">
      <thead>
        <tr>
          <th>#</th>
          <th>Categoría</th>
          <th>Servicio</th>
          <th>Precio</th>
          <th>Descripción</th>
          <th>Tiempo</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="btn-finalizar-container">
      <button class="btn-finalizar" id="btnFinalizar">Finalizar</button>
    </div>
  </div>

  <script type="module" src="/frontend/scripts/profesional/crudCategorias.js"></script>
  <script src="/frontend/utils/header.js"></script>
</body>
</html>
