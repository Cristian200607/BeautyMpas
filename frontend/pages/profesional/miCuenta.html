<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="/frontend/utils/header.css" />
  <link rel="stylesheet" href="/frontend/assets/styles/cssProfesional/miCuenta.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <title>Mi Cuenta</title>
</head>
<body>
  <div id="header-container"></div>
  <div class="container">
    <div class="perfil">
      <button id="btnEditar" class="btn-editar"><i class="bi bi-pencil"></i></button>
      <div class="foto">
        <img src="./imagenes_mi_cuenta/perfil.png" alt="foto de perfil" id="imagenPerfil"/>
      </div>

      <div class="datos">
        <!-- Nombre -->
        <div class="informacion">
  <h2>Nombre:</h2>
  <div id="nombreDisplay" class="display-text"></div>
  <input id="nombre" class="input-oculto" />
</div>

<div class="informacion">
  <h2>Email:</h2>
  <div id="emailDisplay" class="display-text"></div>
  <input id="email" class="input-oculto" readonly />
  <small id="emailAlerta" style="display: none; color: #b91c1c;">
  ⚠️ Para modificar el correo electrónico, realiza una solicitud en el apartado de PQRS.
</small>
</div>

<div class="informacion">
  <h2>Ciudad:</h2>
  <div id="direccionDisplay" class="display-text"></div>
  <input id="direccion" class="input-oculto" />
</div>

<div class="informacion">
  <h2>Direccion:</h2>
  <div id="telefonoDisplay" class="display-text"></div>
  <input id="telefono" class="input-oculto" />
</div>

        <!-- Categorías y Servicios -->
        <div class="informacion categorias">
          <h2>Categorías:</h2>
          <div id="categorias-listado" class="informacion-listado"></div>
          <h2>Servicios:</h2>
          <div id="servicios-listado" class="informacion-listado"></div>
        </div>

        <!-- Botones de acción -->
        <div class="acciones">
          <button id="btnActualizar" class="btn-secundario"><i class="bi bi-save"></i> Guardar</button>
          <button id="btnSeviciosyCategorias" class="btn-principal">Mis servicios</button>
          <button id="btnCitasPendientes" class="btn-principal"><i class="bi bi-calendar-check"></i> Mis citas</button>
        </div>
      </div>
    </div>

    <!-- Portafolio -->
    <div class="portafolio">
      <h1>Portafolio</h1>
      <div class="collage" id="imagenesPortafolio"></div>
      <div class="subir-archivo">
        <h3>Subir imagen de perfil</h3>
        <input type="text" id="urlImagenPerfil" placeholder="URL de imagen de perfil" class="input-text"/>
        <button id="btnSubirImagenPerfil">Subir imagen de perfil</button>

        <h3>Subir imagen al portafolio</h3>
        <input type="text" id="urlArchivo" placeholder="URL de imagen del portafolio" class="input-text"/>
        <button id="btnEnviarArchivo">Subir al portafolio</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script type="module" src="/frontend/scripts/profesional/crudProfesional.js"></script>
  <script type="module" src="/frontend/components/ocultarH2.js"></script>
  <script type="module" src="/frontend/scripts/profesional/imagenesProfesional.js"></script>
  <script src="/frontend/utils/header.js"></script>
</body>
</html>
