<!-- frontend/profesionales.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="/frontend/assets/styles/cssAdmin/profesionalesAdmin.css">
  <link rel="stylesheet" href="/frontend/utils/header.css">
  <title>Listado de Profesionales</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div id="header-container"></div>

  <h1>Listado de Profesionales</h1>
  <table border="1">
    <thead>
  <tr>
    <th>Nombre</th>
    <th>Email</th>
    <th>Dirección</th>
    <th>Teléfono</th>
    <th>Documento</th>
    <th>Acciones</th>
  </tr>
</thead>
    <tbody id="profesionales-body">
      <!-- Aquí se insertan los profesionales desde admin.js -->
    </tbody>
  </table>

  <form id="form-editar-profesional" style="display: none; margin-top: 20px;">
  <h2>Editar Profesional</h2>
  <input type="hidden" id="edit-id" />
  <input type="text" id="edit-nombre" placeholder="Nombre" required />
  <input type="email" id="edit-email" placeholder="Email" required />
  <input type="text" id="edit-direccion" placeholder="Dirección" />
  <input type="text" id="edit-telefono" placeholder="Teléfono" required />
  <select id="edit-tipo-documento" required>
    <option value="">Selecciona tipo de documento</option>
    <option value="CC">Cédula de Ciudadanía</option>
    <option value="CE">Cédula de Extranjería</option>
    <option value="TI">Tarjeta de Identidad</option>
    <option value="PAS">Pasaporte</option>
  </select>
  <input type="number" id="edit-id_categoria" placeholder="ID Categoría" />
  <input type="number" id="edit-id_servicio" placeholder="ID Servicio" />
  <button type="submit">Guardar Cambios</button>
</form>



<script type="module" src="/frontend/scripts/admin/adminProfesionales.js"></script>
<script src="/frontend/utils/header.js"></script>
</body>
</html>
